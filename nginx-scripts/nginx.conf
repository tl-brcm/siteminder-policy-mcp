
worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       8443 ssl;
        server_name  mcp.vm.demo;

        # Use the certificates already present in your project directory
        ssl_certificate      "cert.pem";
        ssl_certificate_key  "key.pem";

        ssl_session_cache    shared:SSL:1m;
        ssl_session_timeout  5m;

        ssl_ciphers  HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers  on;

        # Reverse Proxy for MCP
        location /sm-policy/ {
            proxy_pass http://localhost:3123/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Necessary for SSE (Server-Sent Events) often used by MCP
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Explicitly handle OAuth callback
        location /sm-policy/callback {
            proxy_pass http://localhost:3123/callback;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Handle the discovery endpoint specifically if needed
        location /.well-known/mcp {
            proxy_pass http://localhost:3123/.well-known/mcp;
        }
        
        location /.well-known/oauth-protected-resource/mcp {
            proxy_pass http://localhost:3123/.well-known/oauth-protected-resource/mcp;
        }
    }
}
